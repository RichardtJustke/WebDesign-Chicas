<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho - Chicas Eventos (Modo Local)</title>
    <link rel="stylesheet" href="../../css/optimized.css?v=6">
    <style>
        .carrinho-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px 0;
        }
        
        .carrinho-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .carrinho-header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        
        .carrinho-title {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .carrinho-subtitle {
            color: #7f8c8d;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .modo-local {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .carrinho-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }
        
        .itens-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .resumo-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .item-carrinho {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #ecf0f1;
        }
        
        .item-carrinho:last-child {
            border-bottom: none;
        }
        
        .item-imagem {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            margin-right: 20px;
        }
        
        .item-info {
            flex: 1;
        }
        
        .item-nome {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .item-descricao {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .item-controles {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .quantidade-controle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-quantidade {
            width: 30px;
            height: 30px;
            border: 1px solid #bdc3c7;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-quantidade:hover {
            background: #ecf0f1;
        }
        
        .quantidade-input {
            width: 50px;
            text-align: center;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            padding: 5px;
        }
        
        .item-preco {
            font-size: 1.3rem;
            font-weight: bold;
            color: #27ae60;
            min-width: 100px;
            text-align: right;
        }
        
        .btn-remover {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .btn-remover:hover {
            background: #c0392b;
        }
        
        .resumo-titulo {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .resumo-linha {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px 0;
        }
        
        .resumo-linha.total {
            border-top: 2px solid #ecf0f1;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
        }
        
        .btn-checkout {
            width: 100%;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn-checkout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.3);
        }
        
        .btn-checkout:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .carrinho-vazio {
            text-align: center;
            padding: 60px 20px;
            color: #7f8c8d;
        }
        
        .carrinho-vazio h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .btn-continuar-comprando {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .btn-continuar-comprando:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.3);
        }
        
        /* Modal de checkout */
        .checkout-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }
        
        .checkout-modal-content {
            position: relative;
            background-color: #fefefe;
            margin: 5% auto;
            padding: 0;
            border: none;
            width: 90%;
            max-width: 800px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .checkout-modal-header {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .checkout-modal-title {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
        }
        
        .checkout-close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        
        .checkout-close:hover {
            opacity: 0.7;
        }
        
        .checkout-modal-body {
            padding: 30px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #27ae60;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #c62828;
        }
        
        .success {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2e7d32;
        }
        
        /* Responsivo */
        @media (max-width: 768px) {
            .carrinho-content {
                grid-template-columns: 1fr;
            }
            
            .item-carrinho {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .item-imagem {
                margin-bottom: 15px;
            }
            
            .item-controles {
                width: 100%;
                justify-content: space-between;
            }
            
            .checkout-modal-content {
                width: 95%;
                margin: 10% auto;
            }
            
            .checkout-modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="carrinho-page">
        <!-- Header/Navigation -->
        <header class="header">
            <div class="nav-container">
                <div class="logo">
                    <img src="../../assets/img g/logo/CHICAS EVENTOS_LOGO_VERMELHO.png" alt="Chicas Eventos" loading="eager" />
                </div>
                <nav class="menu">
                    <a href="../../index.html" class="nav-link">HOME</a>
                    <a href="../portifolio/portifolio.html" class="nav-link">PORTIFÓLIO</a>
                    <a href="../sobre/sobre.html" class="nav-link">SOBRE NÓS</a>
                </nav>
                <div class="login-btn">
                    <button class="btn-login" id="login-btn">LOG IN</button>
                    <div class="user-menu" id="user-menu" style="display: none;">
                        <button class="btn-user" id="user-btn">
                            <span id="user-name">NOME DO USUARIO</span>
                        </button>
                        <div class="dropdown-menu" id="dropdown-menu">
                            <a href="../dashboard/dashboard.html" class="dropdown-item">MEUS EVENTOS</a>
                            <a href="carrinho-local.html" class="dropdown-item">VER CARRINHO</a>
                            <a href="#" class="dropdown-item" id="logout-btn">SAIR DA CONTA</a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="carrinho-container">
            <div class="carrinho-header">
                <h1 class="carrinho-title">🛒 Seu Carrinho</h1>
                <p class="carrinho-subtitle">Revise seus itens e finalize sua compra</p>
                <div class="modo-local">
                    🧪 MODO TESTE LOCAL - Funciona sem servidor PHP
                </div>
            </div>

            <div class="carrinho-content">
                <!-- Seção de Itens -->
                <div class="itens-section">
                    <div id="itens-carrinho">
                        <!-- Itens serão carregados dinamicamente -->
                    </div>
                </div>

                <!-- Seção de Resumo -->
                <div class="resumo-section">
                    <h3 class="resumo-titulo">Resumo do Pedido</h3>
                    <div class="resumo-linha">
                        <span>Subtotal:</span>
                        <span id="subtotal">R$ 0,00</span>
                    </div>
                    <div class="resumo-linha">
                        <span>Taxa de serviço:</span>
                        <span id="taxa-servico">R$ 0,00</span>
                    </div>
                    <div class="resumo-linha total">
                        <span>Total:</span>
                        <span id="total">R$ 0,00</span>
                    </div>
                    <button id="btn-checkout" class="btn-checkout" disabled>
                        🧪 Testar Checkout (Local)
                    </button>
                </div>
            </div>
        </div>

        <!-- Modal de Checkout -->
        <div id="checkoutModal" class="checkout-modal">
            <div class="checkout-modal-content">
                <div class="checkout-modal-header">
                    <h2 class="checkout-modal-title">Teste de Checkout</h2>
                    <span class="checkout-close">&times;</span>
                </div>
                <div class="checkout-modal-body">
                    <div id="checkoutContent">
                        <div class="loading">
                            <div class="spinner"></div>
                            <p>Preparando teste...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="carrinho-local.js"></script>
</body>
</html>
